name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'build-fallback-secret-do-not-use-in-production' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 're_placeholder_key' }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_placeholder' }}
      NEXT_PUBLIC_TAILHISTORY_FUNCTION_URL: ${{ secrets.TAILHISTORY_FUNCTION_URL || '' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./dev.db' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri desktop app (Next.js + Rust)
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate update.json
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $pubDate = (Get-Date).ToString('yyyy-MM-ddTHH:mm:ssZ')
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $installer = Get-ChildItem "$nsisDir/*.exe" | Select-Object -First 1
          $sigFile = Get-ChildItem "$nsisDir/*.sig" | Select-Object -First 1
          $signature = if ($sigFile) { Get-Content $sigFile -Raw } else { "" }
          $url = "https://github.com/masterkoster/next-dashboard/releases/download/$env:GITHUB_REF_NAME/$($installer.Name)"
          $json = @{
            version = $version
            notes = "See release notes for details"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url = $url
              }
            }
          }
          $json | ConvertTo-Json -Depth 10 | Set-Content -Path update.json
          Write-Output "Generated update.json for version $version"

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: AviationHub-Windows-Installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload MSI Installer
        uses: actions/upload-artifact@v4
        with:
          name: AviationHub-Windows-MSI
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: AviationHub-Windows-Portable
          path: src-tauri/target/release/AviationHub.exe
          if-no-files-found: warn

      - name: Generate Checksums
        shell: pwsh
        run: |
          Get-FileHash src-tauri/target/release/bundle/nsis/*.exe -Algorithm SHA256 | `
            Select-Object @{N='File';E={Split-Path $_.Path -Leaf}}, Hash | `
            Export-Csv -Path checksums.csv -NoTypeInformation

      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.csv

      - name: Upload update.json
        uses: actions/upload-artifact@v4
        with:
          name: update-json
          path: update.json
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: AviationHub ${{ github.ref_name }}
          body_path: .github/release-template.md
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.sig
            checksums.csv
            update.json
