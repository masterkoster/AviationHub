name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'build-fallback-secret-do-not-use-in-production' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 're_placeholder_key' }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_placeholder' }}
      NEXT_PUBLIC_TAILHISTORY_FUNCTION_URL: ${{ secrets.TAILHISTORY_FUNCTION_URL || '' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./dev.db' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Next.js app
        run: npm run build

      - name: Build Tauri desktop app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: AviationHub-Windows-Installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload MSI Installer
        uses: actions/upload-artifact@v4
        with:
          name: AviationHub-Windows-MSI
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: AviationHub-Windows-Portable
          path: src-tauri/target/release/AviationHub.exe
          if-no-files-found: warn

      - name: Generate Checksums
        shell: pwsh
        run: |
          Get-FileHash src-tauri/target/release/bundle/nsis/*.exe -Algorithm SHA256 | `
            Select-Object @{N='File';E={Split-Path $_.Path -Leaf}}, Hash | `
            Export-Csv -Path checksums.csv -NoTypeInformation

      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.csv

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: AviationHub ${{ github.ref_name }}
          body_path: .github/release-template.md
          draft: true
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            checksums.csv
