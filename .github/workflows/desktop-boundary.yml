name: Desktop Boundary Guard

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  desktop-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Desktop boundary policy
        run: npm run check:desktop-boundary

      - name: Desktop lint
        run: npm run lint:desktop
